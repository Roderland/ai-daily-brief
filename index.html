<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 创业每日简报</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-top">
                <h1>AI 创业每日简报</h1>
                <p class="subtitle">每日精选 AI 商业化资讯，发现下一个机会</p>
            </div>
            <div class="header-meta">
                <span class="update-badge" id="updateBadge">加载中...</span>
                <span class="count-badge" id="countBadge"></span>
            </div>
        </div>
    </header>

    <main class="container">
        <nav class="nav-bar">
            <div class="date-selector" id="dateSelector"></div>
            <div class="filters" id="filters"></div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="搜索关键词..." class="search-input">
            </div>
        </nav>

        <div id="briefList" class="brief-list"></div>

        <div id="loading" class="loading" style="display:none;">
            <div class="spinner"></div>
            <p>加载中...</p>
        </div>

        <div id="emptyState" class="empty-state" style="display:none;">
            <div class="empty-icon">📭</div>
            <h3>暂无内容</h3>
            <p>今天还没有简报，请等待自动化采集完成</p>
        </div>
    </main>

    <!-- Deep Dive Modal -->
    <div id="deepDiveModal" class="modal" style="display:none;">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button class="modal-close" onclick="closeDeepDive()">&times;</button>
            <div id="deepDiveContent">
                <h2 id="deepDiveTitle">分析中...</h2>
                <div class="deep-dive-loading">
                    <div class="spinner"></div>
                    <p>正在联网分析，请稍候...</p>
                </div>
                <div id="deepDiveReport" style="display:none;"></div>
            </div>
        </div>
    </div>

    <div class="container" id="completedDives" style="margin-top:40px;"></div>

    <footer class="footer">
        <div class="container">
            <p>每日自动生成 · <a href="https://github.com/roderland/ai-daily-brief" target="_blank">GitHub</a></p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
